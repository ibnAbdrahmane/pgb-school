

services:
  db:
    image: mysql:8.0
    container_name: pgb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pgb_root_pass
      MYSQL_DATABASE: pgb_school
      MYSQL_USER: pgb_user
      MYSQL_PASSWORD: pgb_pass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    networks:
      - pgb_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-upgb_user", "-ppgb_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pgb_redis
    restart: always
    networks:
      - pgb_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: pgb_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: pgb-secret-key-docker-2024
      DATABASE_URL: mysql+pymysql://pgb_user:pgb_pass@db:3306/pgb_school
      REDIS_URL: redis://redis:6379/0
      UPLOAD_FOLDER: /app/uploads
      FLASK_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pgb_network

networks:
  pgb_network:
    driver: bridge

volumes:
  db_data:
  uploads_data:
